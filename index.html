<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Worms VR Stage is a simple static A-Frame/WebXR scene for Meta Quest Browser."
  />
  <title>Worms VR Stage</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script type="module" src="./main.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="note">
    <strong id="noteTitle">Worms VR Stage</strong>
    <span id="noteMessage">Open this page in Meta Quest Browser and press Enter VR.</span>
    <span id="scoreText">Story sparks: 0 / 5</span>
    <button id="resetButton" type="button">Reset sparks</button>
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #CFE8FF"
  >
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="3 6 2"></a-entity>

    <a-sky color="#CFE8FF"></a-sky>

    <!-- Simple player rig with a camera at normal standing height. -->
    <a-entity id="player-rig" position="0 0 4">
      <a-camera id="player-camera" position="0 1.6 0" wasd-controls-enabled="false">
        <a-cursor
          id="desktop-cursor"
          fuse="true"
          fuse-timeout="900"
          raycaster="objects: .clickable"
          material="color: #111111; shader: flat"
        ></a-cursor>
      </a-camera>
      <a-entity
        id="left-controller"
        laser-controls="hand: left"
        raycaster="objects: .clickable; far: 12"
        line="color: #5AF2FF; opacity: 0.75"
      ></a-entity>
      <a-entity
        id="right-controller"
        laser-controls="hand: right"
        raycaster="objects: .clickable; far: 12"
        line="color: #5AF2FF; opacity: 0.75"
      ></a-entity>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="24"
      height="24"
      color="#4FAD5B"
    ></a-plane>

    <a-plane
      position="0 1.8 -6.2"
      width="9"
      height="3.6"
      color="#FFF6E5"
    ></a-plane>

    <a-plane
      position="0 0.02 -3"
      rotation="-90 0 0"
      width="7"
      height="5"
      color="#E56C3F"
    ></a-plane>

    <a-cylinder
      position="-3.8 0.35 -3"
      radius="0.18"
      height="0.7"
      color="#2C1D14"
    ></a-cylinder>
    <a-cylinder
      position="3.8 0.35 -3"
      radius="0.18"
      height="0.7"
      color="#2C1D14"
    ></a-cylinder>

    <a-box
      position="-1.55 0.75 -3.4"
      rotation="0 28 0"
      width="0.9"
      height="1.5"
      depth="0.45"
      color="#F28749"
    ></a-box>
    <a-sphere
      position="-1.55 1.65 -3.4"
      radius="0.42"
      color="#FFD166"
    ></a-sphere>
    <a-cylinder
      position="-1.55 0.35 -3.4"
      radius="0.28"
      height="0.7"
      color="#6A7BFF"
    ></a-cylinder>

    <a-box
      position="1.55 0.65 -3.9"
      rotation="0 -24 0"
      width="0.8"
      height="1.3"
      depth="0.4"
      color="#6A7BFF"
    ></a-box>
    <a-sphere
      position="1.55 1.45 -3.9"
      radius="0.38"
      color="#F5CDB0"
    ></a-sphere>
    <a-cone
      position="1.55 1.95 -3.9"
      radius-bottom="0.36"
      radius-top="0.06"
      height="0.48"
      color="#E56C3F"
    ></a-cone>

    <a-cylinder
      position="0 0.9 -5.35"
      radius="0.5"
      height="1.8"
      color="#FFD166"
    ></a-cylinder>

    <a-plane position="0 2.85 -5.95" width="5.6" height="0.9" color="#FFFFFF">
      <a-text
        id="sceneTitle"
        value="Worms VR Stage"
        position="0 0.12 0.01"
        color="#111111"
        width="4.8"
        align="center"
      ></a-text>
      <a-text
        id="sceneStatusText"
        value="Story sparks: 0 / 5"
        position="0 -0.22 0.01"
        color="#6B3B1F"
        width="4.4"
        align="center"
      ></a-text>
    </a-plane>

    <a-sphere
      class="clickable"
      data-token
      position="-3 1.2 -4.8"
      radius="0.18"
      color="#FFF07A"
      animation="property: position; dir: alternate; dur: 1800; loop: true; to: -3 1.55 -4.8"
    ></a-sphere>
    <a-sphere
      class="clickable"
      data-token
      position="-0.8 1.7 -4.5"
      radius="0.18"
      color="#FFF07A"
      animation="property: position; dir: alternate; dur: 1500; loop: true; to: -0.8 2.08 -4.5"
    ></a-sphere>
    <a-sphere
      class="clickable"
      data-token
      position="2.7 1.4 -4.9"
      radius="0.18"
      color="#FFF07A"
      animation="property: position; dir: alternate; dur: 1650; loop: true; to: 2.7 1.78 -4.9"
    ></a-sphere>
    <a-sphere
      class="clickable"
      data-token
      position="-2.15 0.85 -2.15"
      radius="0.18"
      color="#FFF07A"
      animation="property: position; dir: alternate; dur: 1700; loop: true; to: -2.15 1.2 -2.15"
    ></a-sphere>
    <a-sphere
      class="clickable"
      data-token
      position="2.1 0.9 -2.4"
      radius="0.18"
      color="#FFF07A"
      animation="property: position; dir: alternate; dur: 1550; loop: true; to: 2.1 1.24 -2.4"
    ></a-sphere>
  </a-scene>
</body>
</html>
