<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Neon Mob City is a Phase 1 Meta Quest WebXR prototype: a retro neon cyberpunk VR hub, one robot factory base, simple enemies, and raycast shooting."
  />
  <title>Neon Mob City</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script type="module" src="./main.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="note">
    <strong id="noteTitle">Neon Mob City</strong>
    <span id="noteMessage">Open in Meta Quest Browser, press Enter VR, then enter the Robot Factory.</span>
    <span id="hudHealth">Health: 100</span>
    <span id="hudObjective">Objective: Choose a mob base</span>
    <span id="hudEnemies">Enemies: Hub patrols</span>
    <span id="hudCityState">City State: Untouched</span>
  </div>

  <a-scene
    id="scene"
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #090018"
    fog="type: exponential; color: #150020; density: 0.035"
  >
    <a-assets id="game-assets"></a-assets>

    <a-entity light="type: ambient; intensity: 0.55; color: #7DFBFF"></a-entity>
    <a-entity light="type: directional; intensity: 0.45; color: #FF4DFF" position="-3 7 4"></a-entity>
    <a-entity light="type: point; intensity: 1.4; distance: 16; color: #00F5FF" position="-4 4 -6"></a-entity>
    <a-entity light="type: point; intensity: 1.2; distance: 14; color: #FF2BD6" position="4 4 -7"></a-entity>

    <a-sky color="#090018"></a-sky>

    <!-- Simple player rig from the base template, extended with tiny thumbstick/WASD locomotion in main.js. -->
    <a-entity id="player-rig" position="0 0 6">
      <a-camera id="player-camera" position="0 1.6 0" wasd-controls-enabled="false">
        <a-cursor
          id="desktop-cursor"
          fuse="false"
          raycaster="objects: .clickable"
          material="color: #00F5FF; shader: flat"
        ></a-cursor>

        <a-entity id="vr-hud" position="0 -0.46 -1.45">
          <a-plane width="1.95" height="0.54" color="#080713" material="opacity: 0.78; transparent: true"></a-plane>
          <a-text id="vrHudText" value="Neon Mob City" position="-0.88 0.16 0.02" width="1.85" color="#F8F7FF"></a-text>
        </a-entity>
      </a-camera>

      <a-entity
        id="left-controller"
        laser-controls="hand: left"
        raycaster="objects: .clickable; far: 22"
        line="color: #00F5FF; opacity: 0.75"
      ></a-entity>
      <a-entity
        id="right-controller"
        laser-controls="hand: right"
        raycaster="objects: .clickable; far: 22"
        line="color: #FF2BD6; opacity: 0.9"
      >
        <a-box id="gun-body" position="0 -0.05 -0.18" width="0.12" height="0.12" depth="0.36" color="#FF2BD6"></a-box>
        <a-box position="0 -0.01 -0.4" width="0.07" height="0.07" depth="0.2" color="#00F5FF"></a-box>
      </a-entity>
    </a-entity>

    <a-entity id="world-root"></a-entity>
    <a-entity id="effects-root"></a-entity>
  </a-scene>
</body>
</html>
